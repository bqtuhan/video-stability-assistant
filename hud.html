<div id="vsa-hud-container" class="vsa-hud-hidden">
  <div class="vsa-hud-header">
    <span class="vsa-hud-title">Video Stability Assistant</span>
    <span id="vsa-hud-close" class="vsa-hud-close">&times;</span>
  </div>
  <div class="vsa-hud-body">
    <div class="vsa-hud-score-row">
      <div class="vsa-hud-gauge">
        <svg viewBox="0 0 36 36" class="vsa-hud-circular-chart">
          <path class="vsa-hud-circle-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
          <path id="vsa-hud-score-path" class="vsa-hud-circle" stroke-dasharray="0, 100" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
          <text x="18" y="20.35" class="vsa-hud-percentage" id="vsa-hud-score-text">0</text>
        </svg>
      </div>
      <div class="vsa-hud-status">
        <div id="vsa-hud-level" class="vsa-hud-level">Excellent</div>
        <div id="vsa-hud-mode" class="vsa-hud-mode">Balanced Mode</div>
      </div>
    </div>
    <div class="vsa-hud-metrics">
      <div class="vsa-hud-metric">
        <span class="vsa-hud-label">Buffer</span>
        <span id="vsa-hud-buffer" class="vsa-hud-value">0.0s</span>
      </div>
      <div class="vsa-hud-metric">
        <span class="vsa-hud-label">Bitrate</span>
        <span id="vsa-hud-bitrate" class="vsa-hud-value">0 kbps</span>
      </div>
      <div class="vsa-hud-metric">
        <span class="vsa-hud-label">Resolution</span>
        <span id="vsa-hud-resolution" class="vsa-hud-value">--</span>
      </div>
    </div>
    <div id="vsa-hud-prediction" class="vsa-hud-prediction vsa-hud-hidden">
      <span class="vsa-hud-warning-icon">⚠️</span>
      <span id="vsa-hud-prediction-text">Freeze likely in 5s</span>
    </div>
  </div>
</div>
